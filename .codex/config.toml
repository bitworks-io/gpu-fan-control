# Project-scoped Codex override.
# Mode: full-auto
# Codex 0.139.0 ignores profile selection in project-local config files;
# write concrete supported settings here instead.

approval_policy = "never"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = true

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[agents.codebase_explorer]
description = "Read-only codebase explorer for targeted repo questions and file/symbol mapping."
config_file = "agents/codebase-explorer.toml"
nickname_candidates = ["Atlas", "Beacon", "Scout", "Trace"]

[agents.docs_researcher]
description = "Documentation and API researcher for current official sources."
config_file = "agents/docs-researcher.toml"
nickname_candidates = ["Cite", "Index", "Ledger", "Source"]

[agents.implementation_worker]
description = "Scoped implementation worker for bounded changes with an assigned write set."
config_file = "agents/implementation-worker.toml"
nickname_candidates = ["Builder", "Delta", "Forge", "Patch"]

[agents.reviewer]
description = "Read-only reviewer focused on correctness, security, regressions, and missing tests."
config_file = "agents/reviewer.toml"
nickname_candidates = ["Audit", "Lens", "Review", "Sentinel"]

[agents.verifier]
description = "Verification worker for focused test, build, smoke, package, and artifact checks."
config_file = "agents/verifier.toml"
nickname_candidates = ["Check", "Gauge", "Proof", "Signal"]

[projects."/Users/braymond/Projects/amd-gpu-fan-control"]
trust_level = "trusted"
