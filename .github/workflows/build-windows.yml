name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    env:
      # Presence of this secret enables the Azure Trusted Signing step below.
      # Builds stay green (unsigned) until Trusted Signing is provisioned and the secrets are set.
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Install build tools
        shell: powershell
        run: |
          choco install swig innosetup -y

      - name: Run core unit tests
        shell: pwsh
        run: dotnet test LightweightAmdGpuFanControl.Tests/LightweightAmdGpuFanControl.Tests.csproj -c Release --nologo

      - name: Build installer
        shell: powershell
        run: |
          .\build.ps1

      - name: Verify ADLX runtime binaries are present
        shell: pwsh
        run: |
          $pub = "LightweightAmdGpuFanControl/bin/Release/net48/publish"
          $required = @("ADLXCSharpBind.dll", "ADLXWrapper.dll", "LightweightAmdGpuFanControl.exe")
          $missing = $required | Where-Object { -not (Test-Path (Join-Path $pub $_)) }
          if ($missing) {
            Write-Error "Missing required binaries in publish output: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All required ADLX binaries present in publish output."

      # Code-sign the installer via Azure Trusted Signing (a.k.a. Artifact Signing). Gated on the
      # AZURE_CLIENT_ID secret, so the build succeeds unsigned until Trusted Signing is provisioned.
      # Setup: create a Trusted Signing account + certificate profile, register an Entra ID app
      # (service principal) granted the "Trusted Signing Certificate Profile Signer" role, then add
      # 6 repo secrets: AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_ENDPOINT,
      # AZURE_SIGNING_ACCOUNT, AZURE_SIGNING_CERTIFICATE. Verify the action version is current before
      # relying on it. Follow-up: also sign the app .exe pre-packaging (requires splitting build.ps1).
      - name: Sign installer (Azure Trusted Signing)
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        uses: azure/trusted-signing-action@v0.5.1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_SIGNING_CERTIFICATE }}
          files-folder: ${{ github.workspace }}\output
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: LightweightAmdGpuFanControl-Setup
          path: output\LightweightAmdGpuFanControl-Setup.exe

      - name: Upload publish output
        uses: actions/upload-artifact@v7
        with:
          name: LightweightAmdGpuFanControl-publish
          path: LightweightAmdGpuFanControl\bin\Release\net48\publish\

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v7
        with:
          name: LightweightAmdGpuFanControl-Setup
          path: ./release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/LightweightAmdGpuFanControl-Setup.exe
          generate_release_notes: true
