name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    # Target the "release" GitHub Environment ONLY on release (v*) tag builds, so the OIDC token
    # subject becomes repo:<owner>/gpu-fan-control:environment:release — matching the Azure Artifact
    # Signing federated credential (Environment entity type). On PRs/main the expression is the empty
    # string, i.e. NO environment, so ordinary builds never touch the environment (and any protection
    # rules you add to it gate only releases). Requires a GitHub Environment named "release".
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'release' || '' }}
    permissions:
      id-token: write   # OIDC: lets azure/login mint a federated token (no stored secret)
      contents: read
    env:
      # Presence of this secret enables the Azure Artifact Signing steps below.
      # Builds stay green (unsigned) until signing is provisioned and the secrets are set.
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Install build tools
        shell: powershell
        run: |
          choco install swig innosetup -y

      - name: Run core unit tests
        shell: pwsh
        run: dotnet test LightweightAmdGpuFanControl.Tests/LightweightAmdGpuFanControl.Tests.csproj -c Release --nologo

      - name: Build installer
        shell: powershell
        run: |
          .\build.ps1

      - name: Verify ADLX runtime binaries are present
        shell: pwsh
        run: |
          $pub = "LightweightAmdGpuFanControl/bin/Release/net48/publish"
          $required = @("ADLXCSharpBind.dll", "ADLXWrapper.dll", "LightweightAmdGpuFanControl.exe")
          $missing = $required | Where-Object { -not (Test-Path (Join-Path $pub $_)) }
          if ($missing) {
            Write-Error "Missing required binaries in publish output: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All required ADLX binaries present in publish output."

      # Code-sign the installer via Azure Artifact Signing (formerly "Trusted Signing"; same
      # Microsoft.CodeSigning service). Gated on BOTH the AZURE_CLIENT_ID secret AND a release (v*)
      # tag: signing runs ONLY on tag builds — the only artifacts that get published — so the build
      # stays green/unsigned on PRs and main, and no signing quota is spent on non-releases. Scoping
      # to tags also keeps the OIDC setup simple: the federated credential only has to match the tag
      # token subject (refs/tags/*), not also main and pull_request. Full Azure onboarding and the six
      # repo secrets are in docs/signing-setup.md. Auth is passwordless OIDC (azure/login mints a
      # federated token; no client secret stored). Follow-up in signing-setup.md §4: also sign the
      # inner app .exe, which requires signing it before Inno Setup packages it (a build split).
      - name: Azure login (OIDC — no stored secret)
        if: ${{ env.AZURE_CLIENT_ID != '' && startsWith(github.ref, 'refs/tags/v') }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign installer (Azure Artifact Signing)
        if: ${{ env.AZURE_CLIENT_ID != '' && startsWith(github.ref, 'refs/tags/v') }}
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_SIGNING_CERTIFICATE }}
          files-folder: ${{ github.workspace }}\output
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          # Pin DefaultAzureCredential to the Azure-CLI session azure/login just established,
          # so it uses the OIDC token — not the AZURE_CLIENT_ID env var, which carries no secret.
          exclude-environment-credential: true
          exclude-azure-cli-credential: false

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: LightweightAmdGpuFanControl-Setup
          path: output\LightweightAmdGpuFanControl-Setup.exe

      - name: Upload publish output
        uses: actions/upload-artifact@v7
        with:
          name: LightweightAmdGpuFanControl-publish
          path: LightweightAmdGpuFanControl\bin\Release\net48\publish\

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v7
        with:
          name: LightweightAmdGpuFanControl-Setup
          path: ./release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/LightweightAmdGpuFanControl-Setup.exe
          generate_release_notes: true
